{% extends 'layout.html' %}

{% block title %}Login - Crack{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-brand">
        <i class="bi bi-lightning-charge-fill"></i> CRACK
    </div>

    <div class="auth-card">
        <h2 style="margin-bottom: 8px; font-size: 1.5rem;">로그인</h2>
        <p style="margin-bottom: 30px; opacity: 0.5; font-size: 0.9rem;">신속한 도로 파손 신고와 확인을 위해<br>로그인이 필요합니다.</p>

        {% if error %}
        <p style="color: #FF4D4D; font-size: 0.85rem; margin-bottom: 15px; font-weight: 600;">{{ error }}</p>
        {% endif %}

        <form method="POST" action="/login" style="display: flex; flex-direction: column; gap: 12px;">
            <input type="text" name="username" placeholder="아이디" required
                style="padding: 14px; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; font-size: 0.95rem; outline: none; transition: 0.2s;">
            <input type="password" name="password" placeholder="비밀번호" required
                style="padding: 14px; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; font-size: 0.95rem; outline: none; transition: 0.2s; margin-bottom: 8px;">

            <button type="submit" class="auth-btn" style="margin-bottom: 0;">
                <i class="bi bi-box-arrow-in-right"></i> 로그인
            </button>
        </form>
        <div class="auth-links">
            <button type="button" class="link-btn" onclick="openModal('findIdModal')">아이디 찾기</button>
            <span>|</span>
            <button type="button" class="link-btn" onclick="openModal('findPwModal')">비밀번호 찾기</button>
        </div>
    </div>
</div>

<!-- 아이디 찾기 모달 -->
<div id="findIdModal" class="modal-overlay">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal('findIdModal')">&times;</button>
        <h3>아이디 찾기</h3>
        <p class="modal-desc">가입할 때 사용한 정보를 입력해주세요.</p>

        <div id="find-id-result" style="margin-bottom: 15px; font-size: 0.9rem; font-weight: 600; text-align: center; min-height: 20px;"></div>

        <form id="find-id-form" class="modal-form">
            <input type="text" id="find-name" name="name" placeholder="이름" required>
            <input type="email" id="find-email" name="email" placeholder="이메일" required>
            <button type="submit" class="auth-btn">아이디 찾기</button>
        </form>
    </div>
</div>

<!-- 비밀번호 찾기 모달 -->
<div id="findPwModal" class="modal-overlay">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal('findPwModal')">&times;</button>
        <h3>비밀번호 찾기</h3>
        <p class="modal-desc">가입한 아이디와 이메일을 입력해주세요.</p>

        <div id="find-pw-result" style="margin-bottom: 15px; font-size: 0.9rem; font-weight: 600; text-align: center; min-height: 20px;"></div>

        <form id="find-pw-form" class="modal-form">
            <input type="text" id="find-pw-username" name="username" placeholder="아이디" required>
            <input type="email" id="find-pw-email" name="email" placeholder="이메일" required>
            <button type="submit" class="auth-btn">비밀번호 찾기</button>
        </form>
    </div>
</div>

<div id="resetPwModal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal('resetPwModal')">&times;</button>
        <h3>비밀번호 재설정</h3>
        <p class="modal-desc">새로운 비밀번호를 입력해주세요.</p>

        <div id="reset-pw-msg" style="margin-bottom: 15px; font-size: 0.85rem; text-align: center;"></div>

        <form id="reset-pw-form" class="modal-form">
            <input type="hidden" id="reset-username"> <input type="password" id="new-password" placeholder="새로운 비밀번호" required>
            <input type="password" id="confirm-password" placeholder="새로운 비밀번호 확인" required>
            <button type="submit" class="auth-btn" style="background: #ff8a00;">비밀번호 변경하기</button>
        </form>
    </div>
</div>

<style>
    .auth-links {
        margin-top: 18px;
        text-align: center;
        font-size: 0.85rem;
        color: #bbb;
    }

    .link-btn {
        background: none;
        border: none;
        color: #666;
        font-size: 0.85rem;
        cursor: pointer;
        margin: 0 6px;
        padding: 0;
        transition: color 0.2s ease;
    }

    .link-btn:hover {
        color: #111;
        text-decoration: underline;
    }

    .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .modal-box {
        position: relative;
        width: 100%;
        max-width: 420px;
        background: #fff;
        border-radius: 20px;
        padding: 28px 24px 24px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        animation: modalFade 0.2s ease;
    }

    .modal-box h3 {
        margin: 0 0 8px;
        font-size: 1.2rem;
        font-weight: 700;
    }

    .modal-desc {
        margin-bottom: 18px;
        font-size: 0.9rem;
        color: #777;
        line-height: 1.5;
    }

    .modal-form {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .modal-form input {
        padding: 14px;
        border: 1px solid rgba(0,0,0,0.1);
        border-radius: 12px;
        font-size: 0.95rem;
        outline: none;
        transition: 0.2s;
    }

    .modal-form input:focus {
        border-color: #666;
    }

    .modal-close {
        position: absolute;
        top: 14px;
        right: 16px;
        background: none;
        border: none;
        font-size: 2.5rem;
        color: #888;
        cursor: pointer;
    }

    .modal-close:hover {
        color: #111;
    }

    @keyframes modalFade {
        from {
            opacity: 0;
            transform: translateY(10px) scale(0.98);
        }
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }
</style>


<script>
    function openModal(modalId) {
        resetModal(modalId);

        const modal = document.getElementById(modalId);
        modal.style.display = 'flex';

        const firstInput = modal.querySelector('input');
        if (firstInput) {
            firstInput.focus();
        }
    }

    function closeModal(modalId) {
        const modal = document.getElementById(modalId);
        modal.style.display = 'none';
        resetModal(modalId);
    }

    function resetModal(modalId) {
        const modal = document.getElementById(modalId);

        modal.querySelectorAll('form').forEach(form => form.reset());

        modal.querySelectorAll('.modal-message').forEach(msg => {
            msg.textContent = '';
            msg.removeAttribute('style');
        });
    }

    // 아이디 찾기 폼 제출 이벤트
document.getElementById('find-id-form').addEventListener('submit', function(e) {
    e.preventDefault(); // 페이지 새로고침 방지

    const name = document.getElementById('find-name').value;
    const email = document.getElementById('find-email').value;
    const resultDiv = document.getElementById('find-id-result');

    fetch('/api/find-id', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 'name': name, 'email': email })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            // 성공 시: 파란색/녹색 톤으로 아이디 표시
            resultDiv.innerHTML = `<span style="color: #2D63FF;">${data.message}</span>`;
            // 성공 후 입력창 초기화 (선택사항)
            // document.getElementById('find-id-form').reset();
        } else {
            // 실패 시: 빨간색으로 에러 표시
            resultDiv.innerHTML = `<span style="color: #FF4D4D;">${data.message}</span>`;
        }
    })
    .catch(err => {
        resultDiv.innerHTML = `<span style="color: #FF4D4D;">서버 통신 중 오류가 발생했습니다.</span>`;
    });
});

// 기존 openModal 함수 수정 (결과창 초기화 로직 추가)
function openModal(modalId) {
    const modal = document.getElementById(modalId);
    modal.style.display = 'flex';

    // 결과 메시지 및 폼 초기화
    if (modalId === 'findIdModal') {
        document.getElementById('find-id-result').innerText = '';
        document.getElementById('find-id-form').reset();
    }

    const firstInput = modal.querySelector('input');
    if (firstInput) firstInput.focus();
}


document.getElementById('find-pw-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const username = document.getElementById('find-pw-username').value;
    const email = document.getElementById('find-pw-email').value;
    const resultDiv = document.getElementById('find-pw-result');

    fetch('/api/find-pw', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 'username': username, 'email': email })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            resultDiv.innerHTML = `<span style="color: #2D63FF;">${data.message}</span>`;
            // 여기에 나중에 "비밀번호 재설정" 버튼을 추가로 띄울 수도 있습니다.
        } else {
            resultDiv.innerHTML = `<span style="color: #FF4D4D;">${data.message}</span>`;
        }
    })
    .catch(err => {
        resultDiv.innerHTML = `<span style="color: #FF4D4D;">서버 통신 중 오류가 발생했습니다.</span>`;
    });
});
// 비밀번호 찾기(확인) 단계
document.getElementById('find-pw-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const username = document.getElementById('find-pw-username').value;
    const email = document.getElementById('find-pw-email').value;
    const resultDiv = document.getElementById('find-pw-result');

    // [중요] 본인의 Blueprint 설정에 따라 '/api/find-pw' 또는 '/auth/api/find-pw'로 수정하세요.
    fetch('/api/find-pw', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 'username': username, 'email': email })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            // 1. 성공 시 기존 모달('findPwModal')을 먼저 닫습니다.
            closeModal('findPwModal');

            // 2. 잠시 후에(0.1초) 새 모달을 띄웁니다. (애니메이션 충돌 방지)
            setTimeout(() => {
                // 새 비밀번호 창에서 사용할 아이디값을 미리 입력해둡니다.
                const resetUsernameInput = document.getElementById('reset-username');
                if(resetUsernameInput) resetUsernameInput.value = username;

                // 비밀번호 재설정 모달 열기
                openModal('resetPwModal');
            }, 100);

        } else {
            // 실패 시 에러 메시지 출력
            resultDiv.innerHTML = `<span style="color: #FF4D4D;">${data.message}</span>`;
        }
    })
    .catch(err => {
        console.error("Error:", err);
        resultDiv.innerHTML = `<span style="color: #FF4D4D;">서버 통신 오류가 발생했습니다.</span>`;
    });
});

// 2. 실제 비밀번호 변경 실행 단계
document.getElementById('reset-pw-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const username = document.getElementById('reset-username').value;
    const password = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;
    const msgDiv = document.getElementById('reset-pw-msg');

    if (password !== confirm) {
        msgDiv.innerText = "비밀번호가 일치하지 않습니다.";
        msgDiv.style.color = "red";
        return;
    }

    fetch('/api/reset-pw', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 'username': username, 'password': password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert("비밀번호가 변경되었습니다. 다시 로그인해주세요.");
            location.reload(); // 페이지 새로고침하여 로그인 유도
        } else {
            msgDiv.innerText = data.message;
            msgDiv.style.color = "red";
        }
    });
});

</script>

{% endblock %}
